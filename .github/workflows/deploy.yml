name: Nginx React Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Go to project folder
        run: cd ~/my-app

      - name: Pull latest code
        run: |
          cd ~/my-app
          git fetch origin
          git reset --hard origin/main

      - name: Install dependencies
        run: |
          cd ~/my-app
          npm install

      - name: Build React app
        run: |
          cd ~/my-app
          npm run build

      - name: Deploy to Nginx
        run: |
          sudo rm -rf /var/www/html/*
          sudo cp -r ~/my-app/build/* /var/www/html/

      - name: Restart Nginx
        run: |
          sudo systemctl restart nginx