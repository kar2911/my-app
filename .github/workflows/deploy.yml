name: Auto Deploy React (Self Hosted)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code into EC2 project
        run: |
          cd ~/my-app
          git pull origin main

      - name: Install dependencies
        run: |
          cd ~/my-app
          npm install

      - name: Restart React App
        run: |
          pm2 restart react-app